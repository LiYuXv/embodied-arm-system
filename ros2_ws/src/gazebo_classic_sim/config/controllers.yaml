controller_manager:
  ros__parameters:
    update_rate: 500

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_state_broadcaster:
  ros__parameters:
    publish_rate: 100.0

arm_controller:
  ros__parameters:
    joints: [L1_joint, L2_joint, L3_joint, L4_joint, L5_joint, L6_joint]
    command_interfaces: [position]
    state_interfaces: [position, velocity]
    open_loop_control: false
    allow_nonzero_velocity_at_trajectory_end: false
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    constraints:
      stopped_velocity_tolerance: 0.03
      # Gazebo needs additional settling time after the trajectory's nominal
      # end when the arm moves through the elevated manipulation workspace.
      # The force-based Gazebo servo is intentionally damped; leave enough
      # post-trajectory settling time for a contact-speed vertical descent.
      goal_time: 12.0
      # CAD inertial approximations leave a repeatable L3 gravity offset.
      # Task execution independently checks the actual TCP in TF after every
      # pose action, so this joint-space tolerance cannot mask an end-effector
      # miss at the cube or target zone.
      L1_joint: {goal: 0.14}
      L2_joint: {goal: 0.14}
      L3_joint: {goal: 0.14}
      L4_joint: {goal: 0.14}
      L5_joint: {goal: 0.14}
      L6_joint: {goal: 0.14}

gripper_controller:
  ros__parameters:
    joints: [L7_joint]
    command_interfaces: [position]
    state_interfaces: [position, velocity]
    open_loop_control: false
    allow_nonzero_velocity_at_trajectory_end: false
    constraints:
      stopped_velocity_tolerance: 0.03
      goal_time: 0.5
      L7_joint: {goal: 0.03}
